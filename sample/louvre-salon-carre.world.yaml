world:
  title: Salon Carre im Louvre
  desc: Ein museumsartiger Prototyp fuer einen virtuellen Saal mit italienischen Altmeistern.

player:
  initialRoom: salonCarreMitte

interactionTypes:
  examine:
    title: Betrachten
    desc: Ein Bild oder Detail genauer betrachten.

objects:
  cimabueMaesta:
    title: Cimabue - Maesta
    desc: Eine monumentale thronende Madonna mit sechs Engeln.
    aliases: [cimabue, maesta, madonna von cimabue]
    tags: [painting, italian, medieval, altarpiece]
    interactions:
      ansehen:
        type: examine
        title: Cimabue betrachten
        aliases: [bild ansehen, cimabue ansehen, maesta betrachten]
        result:
          text: Vor dir erhebt sich eine strenge, leuchtende Maesta - frontal, feierlich und von goldener Wuerde getragen.

  giottoStigmata:
    title: Giotto - Der heilige Franziskus empfaengt die Stigmata
    desc: Franziskus steht in einer felsigen Landschaft und empfaengt die Wundmale Christi.
    aliases: [giotto, franziskus, stigmata]
    tags: [painting, italian, early-renaissance, saint]
    interactions:
      ansehen:
        type: examine
        title: Giotto betrachten
        aliases: [giotto ansehen, franziskus betrachten, stigmata betrachten]
        result:
          text: Giottos Bild zieht den Blick in eine stille, klare Szene, in der Landschaft, Koerper und Geste schon ungewoehnlich greifbar wirken.

  fraAngelicoCoronation:
    title: Fra Angelico - Kroenung der Jungfrau
    desc: Eine lichte himmlische Versammlung rund um die Kroenung Marias.
    aliases: [fra angelico, kroenung, jungfrau maria]
    tags: [painting, italian, devotional, heavenly]
    interactions:
      ansehen:
        type: examine
        title: Fra Angelico betrachten
        aliases: [fra angelico ansehen, kroenung betrachten]
        result:
          text: Das Bild oeffnet sich wie ein kostbares liturgisches Leuchten - zart, geordnet und fast schwerelos.

  uccelloSanRomano:
    title: Uccello - Die Schlacht von San Romano
    desc: Lanzen, Pferde und Ruestungen ordnen das Kampfgeschehen in ein seltsam klares Bildfeld.
    aliases: [uccello, san romano, schlacht]
    tags: [painting, italian, battle, perspective]
    interactions:
      ansehen:
        type: examine
        title: Uccello betrachten
        aliases: [uccello ansehen, san romano betrachten, schlacht betrachten]
        result:
          text: Die Schlacht erscheint zugleich bewegt und eigentümlich geordnet - fast wie ein dramatisches Schachspiel aus Pferden, Lanzen und Linien.

